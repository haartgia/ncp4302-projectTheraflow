<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theraflow Global Progress</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="progress-page">

<div class="container">

    <aside class="sidebar is-collapsed" id="sidebar">

        <div class="sidebar-top">
</div>

        <div class="logo">
            <div class="logo-icon" aria-hidden="true"><i class="fa-solid fa-hand-holding-heart"></i></div>
            <div class="logo-wordmark">Theraflow</div>
        </div>

        <div class="active-indicator" aria-hidden="true"></div>
        <ul class="menu">
            <li data-page="doctor_dashboard.html">
                <i class="fa-solid fa-gauge-high"></i>
                <span class="nav-label">Dashboard</span>
            </li>
            <li data-page="patients.html">
                <i class="fa-solid fa-users"></i>
                <span class="nav-label">Patients</span>
            </li>
            <li data-page="therapy_plans.html">
                <i class="fa-solid fa-notes-medical"></i>
                <span class="nav-label">Therapy Plans</span>
            </li>
            <li class="active" aria-current="page" data-page="progress.html">
                <i class="fa-solid fa-chart-line"></i>
                <span class="nav-label">Progress</span>
            </li>
            <li data-page="messages.html" class="has-unread">
                <i class="fa-regular fa-message"></i>
                <span class="nav-label">Messages</span>
                <span class="nav-alert-dot" aria-hidden="true"></span>
            </li>
            <li data-page="settings.html">
                <i class="fa-solid fa-user-circle"></i>
                <span class="nav-label">Account &amp; Settings</span>
            </li>
        </ul>

        <div class="sidebar-footer">
<button class="logout-btn" id="logoutBtn" aria-label="Log out">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span class="nav-label">Logout</span>
            </button>
        </div>

    </aside>

    <main class="content progress-content">
        <section class="progress-shell" id="globalProgressRoot" aria-labelledby="globalProgressTitle">
            <div class="progress-header-row">
                <div>
                    <h1 id="globalProgressTitle">Global Progress</h1>
                    <p class="subheader">Compare recovery trends and clinic-wide activity in one view.</p>
                </div>
                <button type="button" class="sign-in-btn" id="downloadMonthlyReportBtn">Download Monthly Report</button>
            </div>

            <article class="widget widget-green progress-comparison-card">
                <h2 class="widget-title">Comparative Analytics</h2>
                <div class="chart-wrap">
                    <canvas id="globalProgressComparisonChart"></canvas>
                </div>
            </article>

            <div class="progress-lower-grid">
                <article class="widget widget-blue progress-leaderboard-card">
                    <h2 class="widget-title">Weekly Performance Leaderboard</h2>
                    <ol class="progress-leaderboard-list" id="progressLeaderboardList"></ol>
                </article>

                <article class="widget widget-blue progress-heatmap-card">
                    <h2 class="widget-title">Activity Heatmap</h2>
                    <div class="progress-heatmap-grid" id="clinicHeatmapGrid"></div>
                </article>
            </div>
        </section>
    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>
</body>
</html>
