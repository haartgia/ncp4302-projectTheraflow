<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theraflow Messages</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="messages-page">

<div class="container">

    <aside class="sidebar is-collapsed" id="sidebar">

        <div class="sidebar-top">
</div>

        <div class="logo">
            <div class="logo-icon" aria-hidden="true"><i class="fa-solid fa-hand-holding-heart"></i></div>
            <div class="logo-wordmark">Theraflow</div>
        </div>

        <div class="active-indicator" aria-hidden="true"></div>
        <ul class="menu">
            <li data-page="doctor_dashboard.html">
                <i class="fa-solid fa-gauge-high"></i>
                <span class="nav-label">Dashboard</span>
            </li>
            <li data-page="patients.html">
                <i class="fa-solid fa-users"></i>
                <span class="nav-label">Patients</span>
            </li>
            <li data-page="therapy_plans.html">
                <i class="fa-solid fa-notes-medical"></i>
                <span class="nav-label">Therapy Plans</span>
            </li>
            <li data-page="progress.html">
                <i class="fa-solid fa-chart-line"></i>
                <span class="nav-label">Progress</span>
            </li>
            <li class="active has-unread" aria-current="page" data-page="messages.html">
                <i class="fa-regular fa-message"></i>
                <span class="nav-label">Messages</span>
                <span class="nav-alert-dot" id="messagesNavDot" aria-hidden="true"></span>
            </li>
            <li data-page="settings.html">
                <i class="fa-solid fa-user-circle"></i>
                <span class="nav-label">Account &amp; Settings</span>
            </li>
        </ul>

        <div class="sidebar-footer">
<button class="logout-btn" id="logoutBtn" aria-label="Log out">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span class="nav-label">Logout</span>
            </button>
        </div>

    </aside>

    <main class="content messages-content">
        <section class="messages-shell" id="messagesPageRoot" aria-labelledby="messagesTitle">
            <h1 id="messagesTitle" class="sr-only">Messages</h1>
            <div class="messages-split-layout">
                <aside class="widget widget-blue messages-list-pane">
                    <div class="messages-list-head">
                        <h2 class="widget-title">Patients</h2>
                        <input type="search" id="messageSearchInput" placeholder="Search Patient Name..." autocomplete="off">
                    </div>
                    <ul class="messages-patient-list" id="messagePatientList"></ul>
                </aside>

                <article class="widget widget-blue messages-chat-pane">
                    <header class="messages-chat-header">
                        <h2 id="activeConversationName">Select a patient</h2>
                        <p id="activeConversationMeta">No active conversation selected.</p>
                    </header>

                    <div class="messages-thread" id="messageThread"></div>

                    <div class="messages-quick-actions">
                        <button type="button" class="doctor-btn quick-template-btn" data-template="Good job today!">Good job today!</button>
                        <button type="button" class="doctor-btn quick-template-btn" data-template="Please complete your session">Please complete your session</button>
                        <button type="button" class="doctor-btn quick-template-btn" data-template="Plan updated.">Plan updated.</button>
                    </div>

                    <div class="messages-compose-row">
                        <label class="sr-only" for="messageComposeInput">Type message</label>
                        <input type="text" id="messageComposeInput" placeholder="Type A Message...">
                        <button type="button" class="sign-in-btn" id="sendMessageBtn">Send</button>
                    </div>
                </article>
            </div>
        </section>
    </main>

</div>

<script src="script.js"></script>
</body>
</html>
